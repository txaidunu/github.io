<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melatonin Melange</title>
</head>

<body style="margin:0; font-family:system-ui; background:#0b1020; color:white; display:flex; align-items:center; justify-content:center; min-height:100vh;">

<div style="width:100%; max-width:420px; padding:24px; text-align:center;">

  <h1>Melatonin Melange</h1>
  <p style="opacity:0.7;">$100 USD</p>

  <p id="status">Fetching token price...</p>

  <div id="payment" style="display:none;">

    <h2 id="amount"></h2>

    <a id="paylink"
      style="display:block; margin-top:12px; padding:14px; background:#22c55e; border-radius:12px; color:black; text-decoration:none;">
      Open Wallet
    </a>

    <div style="margin-top:20px; background:white; padding:12px; border-radius:12px;">
      <img id="qr" style="width:100%;">
    </div>

  </div>

</div>

<script>
const RECEIVING_WALLET = "H115kTVj5QsT58w6Xg9hviyoALWqVZ1DLTvhVDeQ66w4";
const TOKEN_MINT = "QWYpq3zoqkEMywgAVJggtXqXHkhT5HCcFEPpoK5drug";
const USD_PRICE = 100;

// 🔥 Fetch price from DexScreener
async function fetchPrice() {
  try {
    const res = await fetch("https://api.dexscreener.com/latest/dex/tokens/" + TOKEN_MINT);
    const data = await res.json();

    if (!data.pairs || data.pairs.length === 0) {
      document.getElementById("status").innerText = "No price found (token not listed?)";
      return;
    }

    const price = parseFloat(data.pairs[0].priceUsd);

    if (!price || price <= 0) {
      document.getElementById("status").innerText = "Invalid price data";
      return;
    }

    const amount = (USD_PRICE / price).toFixed(6);

    const url = "solana:" + RECEIVING_WALLET +
      "?amount=" + amount +
      "&spl-token=" + TOKEN_MINT +
      "&label=Melatonin Melange";

    document.getElementById("status").innerText =
      "Token price: $" + price.toFixed(6);

    document.getElementById("amount").innerText =
      amount + " tokens";

    document.getElementById("paylink").href = url;

    document.getElementById("qr").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=" +
      encodeURIComponent(url);

    document.getElementById("payment").style.display = "block";

  } catch (e) {
    document.getElementById("status").innerText = "Error fetching price";
  }
}

fetchPrice();
</script>

</body>
</html>
