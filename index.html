<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melatonin Melange</title>
</head>

<body style="background:#0b1020;color:white;font-family:sans-serif;padding:20px;max-width:520px;margin:auto;">

<h1>Melatonin Melange</h1>

<a href="https://pump.science/experiments/MELATONIN?mint=QWYpq3zoqkEMywgAVJggtXqXHkhT5HCcFEPpoK5drug&exp=98ba4e07-5acb-4f70-ac14-d01919f22085&mode=trading" target="_blank" style="color:#93c5fd;">
View Experimental Data
</a>

<h3>Select Package</h3>

<button onclick="selectPackage('one')" style="width:100%;padding:14px;margin:6px 0;">
1 Lunar Cycle ($100)
</button>

<button onclick="selectPackage('two')" style="width:100%;padding:14px;margin:6px 0;">
2 Lunar Cycles ($200)
</button>

<div id="form" style="display:none;margin-top:20px;">
  <h3>Shipping (US only)</h3>

  <input id="name" placeholder="Full Name" style="width:100%;padding:10px;margin:5px 0;"><br>
  <input id="address" placeholder="Address" style="width:100%;padding:10px;margin:5px 0;"><br>
  <input id="city" placeholder="City" style="width:100%;padding:10px;margin:5px 0;"><br>
  <input id="state" placeholder="State" style="width:100%;padding:10px;margin:5px 0;"><br>
  <input id="zip" placeholder="ZIP" style="width:100%;padding:10px;margin:5px 0;"><br>

  <button onclick="createOrder()" style="width:100%;padding:14px;margin-top:10px;">
    Continue to Payment
  </button>
</div>

<p id="debug" style="margin-top:20px;color:#facc15;white-space:pre-wrap;"></p>

<div id="payment" style="display:none;">
  <h3 id="amount"></h3>

  <a id="paylink" target="_blank" style="display:block;background:#22c55e;color:black;padding:12px;text-align:center;text-decoration:none;">
    Open Wallet
  </a>

  <br>

  <img id="qr" style="width:250px;background:white;padding:10px;">

  <p id="status">Waiting for payment...</p>
</div>

<script>
let selectedPackage = null;
const API_BASE = "https://txaidunu-github-io.vercel.app";

function selectPackage(p) {
  selectedPackage = p;
  document.getElementById("form").style.display = "block";
  document.getElementById("debug").innerText = "Selected package: " + p;
}

async function createOrder() {
  const debug = document.getElementById("debug");

  try {
    debug.innerText = "Creating order...";

    if (!selectedPackage) {
      debug.innerText = "Error: choose a package first.";
      return;
    }

    const res = await fetch(API_BASE + "/api/create-order", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        packageType: selectedPackage,
        address: {
          name: document.getElementById("name").value,
          address: document.getElementById("address").value,
          city: document.getElementById("city").value,
          state: document.getElementById("state").value,
          zip: document.getElementById("zip").value
        }
      })
    });

    const text = await res.text();
    let data;

    try {
      data = JSON.parse(text);
    } catch {
      debug.innerText = "Server returned non-JSON:\n" + text;
      return;
    }

    if (!res.ok) {
      debug.innerText = "Order error:\n" + JSON.stringify(data, null, 2);
      return;
    }

    debug.innerText =
      "Order created\n" +
      "Supabase OK: " + data.supabaseOk + "\n" +
      "Status: " + data.supabaseStatus + "\n" +
      "Order ID: " + data.orderId;

    document.getElementById("amount").innerText = data.tokenAmount + " tokens";
    document.getElementById("paylink").href = data.payUrl;

    document.getElementById("qr").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=" +
      encodeURIComponent(data.payUrl);

    document.getElementById("payment").style.display = "block";

    checkPayment(data.reference);

  } catch (err) {
    debug.innerText = "Checkout error: " + err.message;
  }
}

function checkPayment(ref) {
  setInterval(async () => {
    try {
      const r = await fetch(API_BASE + "/api/check-payment?reference=" + ref);
      const d = await r.json();

      if (d.paid) {
        document.getElementById("status").innerText =
          "Payment confirmed!";
      }
    } catch (err) {
      document.getElementById("status").innerText =
        "Payment check error: " + err.message;
    }
  }, 5000);
}
</script>

</body>
</html>
