<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melatonin Melange</title>
</head>

<body style="background:#0b1020;color:white;font-family:sans-serif;padding:20px;">

<h1>Melatonin Melange</h1>

<a href="https://pump.science/experiments/MELATONIN?mint=QWYpq3zoqkEMywgAVJggtXqXHkhT5HCcFEPpoK5drug&exp=98ba4e07-5acb-4f70-ac14-d01919f22085&mode=trading" target="_blank">
View Experimental Data
</a>

<h3>Select Package</h3>

<button onclick="selectPackage('one')">1 Lunar Cycle ($100)</button>
<button onclick="selectPackage('two')">2 Lunar Cycles ($200)</button>

<div id="form" style="display:none;margin-top:20px;">
  <h3>Shipping (US only)</h3>
  <input id="name" placeholder="Full Name"><br>
  <input id="address" placeholder="Address"><br>
  <input id="city" placeholder="City"><br>
  <input id="state" placeholder="State"><br>
  <input id="zip" placeholder="ZIP"><br>

  <button onclick="createOrder()">Continue to Payment</button>
</div>

<div id="payment" style="display:none;">
  <h3 id="amount"></h3>
  <a id="paylink">Open Wallet</a>
  <img id="qr" style="width:250px;">
  <p id="status">Waiting for payment...</p>
</div>

<script>
let selectedPackage;

function selectPackage(p) {
  selectedPackage = p;
  document.getElementById("form").style.display = "block";
}

async function createOrder() {
  const res = await fetch("/api/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      packageType: selectedPackage,
      address: {
        name: document.getElementById("name").value
      }
    })
  });

  const data = await res.json();

  document.getElementById("amount").innerText =
    data.tokenAmount + " tokens";

  document.getElementById("paylink").href = data.payUrl;

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?data=" +
    encodeURIComponent(data.payUrl);

  document.getElementById("payment").style.display = "block";

  checkPayment(data.reference);
}

async function checkPayment(ref) {
  setInterval(async () => {
    const r = await fetch("https://txaidunu-github-io.vercel.app/api/check-payment?reference=" + ref);
    const d = await r.json();

    if (d.paid) {
      document.getElementById("status").innerText = "Payment confirmed!";
    }
  }, 5000);
}
</script>

</body>
</html>
