<div id="solana-pay-box">
  <h2>Pay with Solana</h2>
  <p class="sub">Price: <strong>$100 USD</strong></p>

  <div class="rate-box">
    <label>Token price in USD</label>
    <input id="tokenPrice" type="number" step="0.000001" placeholder="Example: 0.25">
    <button onclick="calculatePayment()">Calculate payment</button>
  </div>

  <div id="paymentResult" style="display:none;">
    <p>You need to send:</p>
    <h3><span id="tokenAmount"></span> tokens</h3>

    <a id="payButton" href="#" class="pay-button">Open Wallet</a>

    <div id="qrWrap">
      <img id="qrCode" alt="Solana Pay QR Code">
    </div>

    <p class="tiny">
      Scan with Phantom, Solflare, Backpack, or another Solana Pay compatible wallet.
    </p>
  </div>
</div>

<style>
  #solana-pay-box {
    max-width: 420px;
    margin: 0 auto;
    padding: 24px;
    border-radius: 24px;
    background: #0b1020;
    color: #ffffff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  #solana-pay-box h2 {
    margin: 0 0 8px;
    font-size: 28px;
  }

  .sub {
    opacity: 0.85;
    margin-bottom: 24px;
  }

  .rate-box {
    display: grid;
    gap: 12px;
  }

  label {
    font-size: 14px;
    opacity: 0.8;
  }

  input {
    width: 100%;
    box-sizing: border-box;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 18px;
    text-align: center;
  }

  button, .pay-button {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: #7c3cff;
    color: white;
    font-size: 17px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
  }

  #paymentResult {
    margin-top: 24px;
  }

  #paymentResult h3 {
    font-size: 30px;
    margin: 8px 0 18px;
  }

  #qrWrap {
    margin-top: 18px;
    padding: 14px;
    border-radius: 18px;
    background: white;
  }

  #qrCode {
    width: 100%;
    max-width: 280px;
  }

  .tiny {
    font-size: 12px;
    opacity: 0.65;
    margin-top: 14px;
  }
</style>

<script>
  const RECEIVING_WALLET = "H115kTVj5QsT58w6Xg9hviyoALWqVZ1DLTvhVDeQ66w4";
  const TOKEN_MINT = "QWYpq3zoqkEMywgAVJggtXqXHkhT5HCcFEPpoK5drug";
  const USD_PRICE = 100;
  const PROJECT_LABEL = "Your Project";
  const MEMO = "Product payment";

  function calculatePayment() {
    const tokenPrice = parseFloat(document.getElementById("tokenPrice").value);

    if (!tokenPrice || tokenPrice <= 0) {
      alert("Enter the current token price in USD.");
      return;
    }

    const amount = USD_PRICE / tokenPrice;
    const roundedAmount = amount.toFixed(6);

    const solanaPayUrl =
      "solana:" + RECEIVING_WALLET +
      "?amount=" + encodeURIComponent(roundedAmount) +
      "&spl-token=" + encodeURIComponent(TOKEN_MINT) +
      "&label=" + encodeURIComponent(PROJECT_LABEL) +
      "&message=" + encodeURIComponent("Payment of $" + USD_PRICE) +
      "&memo=" + encodeURIComponent(MEMO);

    document.getElementById("tokenAmount").innerText = roundedAmount;
    document.getElementById("payButton").href = solanaPayUrl;
    document.getElementById("qrCode").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=" +
      encodeURIComponent(solanaPayUrl);

    document.getElementById("paymentResult").style.display = "block";
  }
</script>
